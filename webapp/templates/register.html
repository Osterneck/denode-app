{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="card-title mb-1 fw-bold"><i class="fas fa-database me-2 text-primary"></i>DEnode</h2>
                <p class="text-muted mb-1">Create your free account</p>
                <p class="text-muted small mb-4"><i class="fas fa-check-circle text-success me-1"></i>Free plan includes 1 full schema analysis — no credit card required.</p>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" name="email" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password <span class="text-muted small">(min 8 characters)</span></label>
                        <input type="password" name="password" class="form-control" required minlength="8">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Create Free Account</button>
                </form>
                <p class="text-center text-muted mb-0">
                    Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
